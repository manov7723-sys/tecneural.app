server {
    listen 80;
    server_name htcai.local;

    location / {
        proxy_pass http://app:3000/a/htcai;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name tecneuralai.local;

    location / {
        proxy_pass http://app:3000/a/tecneuralai;
        proxy_set_header Host $host;
    }
}