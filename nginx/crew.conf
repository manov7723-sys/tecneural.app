server {
    listen 80;
    server_name tecneuralai.com;

    location / {
        proxy_pass http://127.0.0.1:3000/a/tecneuralai;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 80;
    server_name htcai.com;

    location / {
        proxy_pass http://127.0.0.1:3000/a/htcai;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}